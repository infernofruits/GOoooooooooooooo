<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scle=1.0">
    <title>GO</title>
    <style>

        :root {
            --bg-color: #302e2b;
            --panel-bg: #262522;
            --text-main: #ffffff;
            --text-muted: #81b64c;
            --accent-green: #81b64c;
            --accent-green-hover: #a3d16c;
            --border-color: #403e3b;
            --wood-board: #deb887;
            --wood-lines: #543d2b;
        }


        body {
            font-family:'Segoe UI' Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }


        .game-container {
            display:flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            position: realtive;
        }


        .setup-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }


        .setup-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: var(--text-main);
        }


        .setup-section {
            margin-bottom: 30px;
            width: 100%;
            max-width: 540px;
        }


        .setup-section h3 {
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }


        .options-grid {
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }


        .opt-btn {
            background-color : var(--bg-color);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 15px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s ease;
            display:flex;
            flex-direction:column;
            align-items: center;
            justify-content: center;
        }


        .opt-btn:hover {
            border-color: var(--text-muted);
            background-color: rgba(255,255,255,0.05);
        }


        .opt-btn-selected {
            border-color: var(--accent-green);
            background-color: rgba(129,182,76,0.15);
        }


        .personality-desc {
            font-size: 0.74rem;
            font-weight: normal;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
            line-height: 1.2;
        }


        .start.btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size:1.3rem;
            font-weight: bold;
            border-radius: 6px;
            cursor:pointer;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 4px 0 #5b8733;
            transition: background 0.2s;
        }


        .start-btn:hover {
            background-color: var(--accent-green-hover);
        }


        .board-wrapper {
            display: none;
            position: realtive;
            flex-direction: row;
            align-items: center;
            gap: 20px;
        }


        .score-bar-container {
            width: 240px;
            height: 500px;
            background-color: #222;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }


        .score-white {
            width: 100%;
            height: 50%;
            background-color: #f0f0f0;
            transition: height 0.4s ease;
        }
        

        .score-black {
            width: 100%;
            flex-grow: 1;
            background-color: #111;
        }


        .score-text {
            position:absolute;
            width: 100%;
            text-align:center;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 10;
            left: 0;
            pointer-events: none;
        }


        .score-text.top-text {
            top: 5px;
            color: #111;
        }


        .score-text.bottom-text {
            bottom: 5px;
            color: #f0f0f0;
        }


        .board-box {
            position: relative;
            background-color: var(--wood -board);
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }


        #goCanvas {
            cursor: pointer;
            display: block;
        }


        .sidebar {
            display: none;
            flex-direction: column;
            flex: 1;
            background-color: var(--bg-color);
            border-radius: 6px;
            padding: 20px;
            box-sizing: border-box;
            justify-content: space-between;
            min-width: 320px;
            height: 540px;
        }


        .opponent-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--panel-bg);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .opponent-avatar {
            width: 50px;
            height: 50px;
            border-radius:50%;
            background-size: cover;
            background-position: center;
            background-color:#444;
            user-select:none;
        }


        .opponent-info h4{
            font-size: 0.85rem;
            color: var(--text-muted);
        }


        .chat-area {
            flex-grow:1;
            margin:15px 0;
            background-color: var(--panel-bg);
            border-radius: 6px;
            border:1px solid var(--border-color);
            display: flex;
            flex-direction:column;
            overflow: hidden;
            height: 240px;
        }


        .chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y:auto;
            display:flex;
            flex-direction:column;
            gap: 10px;
        }
         
        
        .msg {
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
        }


        .msg.ai {
            background-color:var(--border-color);
            color:var(--text-main);
            align-self:flex-start;
            border-top-left-radius: 0;
        }


        .msg.player {
            background-color:var(--accent-green);
            color:white;
            align-self: flex-end;
            border-top-right-radius: 0;
        }
        

        .system-status {
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: bold;
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            color: white;
        }

        .btn-pass {
            background-color: #3498db;
        }

        .btn-pass:hover {
            background-color: #2980b9;
        }


        .btn-resign {
            background-color:#fa3e3e;
        }

        .btn-resign:hover {
            background-color:#ff5252;
        }


        .btn-menu {
            background-color: #403e3b;
        }


        .btn-menu:hover {
            background-color: #4f4d49;
        }
    </style>
 </head>


<body>

                <button class="action-btn btn-menu" id="menuBtn">Menu</button>
            </div>
        </div>
    </div>
